<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Schedule Planner</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the full URL in sessionStorage, then redirects to index.html
      // index.html restores the URL via history.replaceState before React renders
      sessionStorage.redirect = location.href;
      var pathSegmentsToKeep = 1; // '/schedule-planner/' is one segment
      location.replace(
        location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') +
        location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
      );
    </script>
  </head>
  <body></body>
</html>
